<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point synchro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Bienvenue !!</h1>
    </header>

    <div class="add-one">
        <div class="add-one-btn" id="addButton">
            <button class="btn btn-primary btn-add" onclick="addParticipant()">Nouveau participant ?</button>
        </div>
        <div class="input-form" id="inputForm">
            <input type="text" class="field field-prenom" id="prenom" placeholder="Prénom" required>
            <input type="text" class="field field-nom" id="nom" placeholder="Nom" required>
            <input type="text" class="field field-surnom" id="surnom" placeholder="Surnom (optionnel)">
            <button class="btn btn-submit" onclick="submitForm()">Soumettre</button>
            <button class="btn btn-cancel" onclick="resetForm()">Annuler</button>
        </div>
    </div>

    <div class="participant-list">
        <h3>Liste des participants</h3>
        <div id="participantTable">Chargement...</div>
    </div>

    <div class="dico-enfants-list">
        <h3>Dictionnaire pour enfants</h3>
        <div id="motsList">Chargement...</div>
    </div>

    <div class="nav-buttons">
        <button class="btn btn-primary btn-nav" onclick="window.location.href='reunion.html';">
            Accéder à la page de réunion
        </button>
    </div>

    <script>
        // ===== Fonctions admin =====

        async function deleteParticipant(id) {
            if (!confirm('Supprimer ce participant ?')) return;
            try {
                const { error } = await supabaseClient.from('participants').delete().eq('id', id);
                if (error) throw error;
                alert('Participant supprimé !');
                await renderParticipantTable();
            } catch (error) {
                console.error('Erreur lors de la suppression:', error);
                alert('Erreur lors de la suppression');
            }
        }

        async function toggleSelect(id, currentSelected, checkboxEl) {
            const newSelected = !currentSelected;
            try {
                await supabaseClient.from('participants').update({ selected: newSelected }).eq('id', id);
            } catch (error) {
                console.error('Erreur update select:', error);
            }
            if (checkboxEl) {
                checkboxEl.checked = newSelected;
                checkboxEl.classList.toggle('selected', newSelected);
            }
            const row = checkboxEl ? checkboxEl.closest('.participant-row') : null;
            if (row) {
                row.classList.toggle('selected', newSelected);
            }
        }
    </script>
</body>
</html>
