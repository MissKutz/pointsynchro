<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point synchro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Bienvenue !!</h1>
    </header>

    <div id="addOne">
        <div id="addButton">
            <button class="btn" id="btnAdd" onclick="addParticipant()">Nouveau participant ?</button>
        </div>
        <div id="inputForm">
            <input type="text" id="prenom" placeholder="Prénom" required>
            <input type="text" id="nom" placeholder="Nom" required>
            <input type="text" id="surnom" placeholder="Surnom (optionnel)">
            <button onclick="submitForm()">Soumettre</button>
            <button onclick="resetForm()">Annuler</button>
        </div>
    </div>

    <button onclick="window.location.href='reunion.html';">
        Accéder à la page de réunion
    </button>

</body>
</html>
